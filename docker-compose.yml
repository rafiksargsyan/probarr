services:
  backend:
    image: rsargsyan/probarr-backend:latest
    ports:
      - "${BACKEND_PORT:-8091}:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      ADMIN_FIREBASE_PROJECT_ID: ${ADMIN_FIREBASE_PROJECT_ID}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      GRABBERR_BASE_URL: ${GRABBERR_BASE_URL}
      GRABBERR_API_KEY_ID: ${GRABBERR_API_KEY_ID}
      GRABBERR_API_KEY: ${GRABBERR_API_KEY}
      JACKETT_BASE_URL: ${JACKETT_BASE_URL}
      JACKETT_API_KEY: ${JACKETT_API_KEY}
      JACKETT_TORRENT_DOWNLOAD_TIMEOUT_SECONDS: ${JACKETT_TORRENT_DOWNLOAD_TIMEOUT_SECONDS:-10}
      TMDB_API_KEY: ${TMDB_API_KEY}
      TVDB_API_KEY: ${TVDB_API_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      MOVIE_SCAN_STALE_TIMEOUT_SECONDS: ${MOVIE_SCAN_STALE_TIMEOUT_SECONDS:-3600}
      PROBARR_S3_ACCESS_KEY_ID: ${PROBARR_S3_ACCESS_KEY_ID}
      PROBARR_S3_SECRET_ACCESS_KEY: ${PROBARR_S3_SECRET_ACCESS_KEY}
      PROBARR_S3_REGION: ${PROBARR_S3_REGION:-us-east-1}
      PROBARR_S3_ENDPOINT: ${PROBARR_S3_ENDPOINT}
      PROBARR_S3_BUCKET: ${PROBARR_S3_BUCKET}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  admin-ui:
    image: rsargsyan/probarr-admin-ui:latest
    ports:
      - "${ADMIN_UI_PORT:-5177}:80"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_ADMIN_FIREBASE_API_KEY: ${VITE_ADMIN_FIREBASE_API_KEY}
      VITE_ADMIN_FIREBASE_AUTH_DOMAIN: ${VITE_ADMIN_FIREBASE_AUTH_DOMAIN}
      VITE_ADMIN_FIREBASE_PROJECT_ID: ${VITE_ADMIN_FIREBASE_PROJECT_ID}
      VITE_ADMIN_FIREBASE_STORAGE_BUCKET: ${VITE_ADMIN_FIREBASE_STORAGE_BUCKET}
      VITE_ADMIN_FIREBASE_MESSAGING_SENDER_ID: ${VITE_ADMIN_FIREBASE_MESSAGING_SENDER_ID}
      VITE_ADMIN_FIREBASE_APP_ID: ${VITE_ADMIN_FIREBASE_APP_ID}
    restart: unless-stopped

  web-ui:
    image: rsargsyan/probarr-web-ui:latest
    ports:
      - "${WEB_UI_PORT:-5178}:80"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
      VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
      VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
      VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
      VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
    restart: unless-stopped
