services:
  gluetun:
    image: qmcgaw/gluetun:v3.41.1
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER:-protonvpn}
      - VPN_TYPE=${VPN_TYPE:-wireguard}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_COUNTRIES=${VPN_SERVER_COUNTRIES:-Netherlands}
      - SERVER_CITIES=${VPN_SERVER_CITIES}
      - SERVER_HOSTNAMES=${VPN_SERVER_HOSTNAMES}
      - SERVER_NAMES=${VPN_SERVER_NAMES}
      - DOT=off
      - DNS_ADDRESS=8.8.8.8
    ports:
      - "${JACKETT_PORT:-9117}:9117"
    restart: unless-stopped

  jackett:
    image: lscr.io/linuxserver/jackett:0.24.1736
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - AUTO_UPDATE=false
    volumes:
      - jackett-config:/config
    depends_on:
      - gluetun
    restart: unless-stopped

volumes:
  jackett-config:
